<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
    :root {
      color-scheme: light;
      background: #eef2f7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(90deg, rgba(15, 23, 42, 0.035) 1px, transparent 1px),
        linear-gradient(rgba(15, 23, 42, 0.035) 1px, transparent 1px),
        #eef2f7;
      background-size: 32px 32px;
    }

    main {
      position: relative;
      width: min(980px, 100%);
      overflow: hidden;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.18);
    }

    .bars {
      height: 92px;
      overflow: hidden;
      border-bottom: 1px solid #111827;
      background: #111827;
    }

    .bars img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    .pattern {
      min-height: min(68vh, 680px);
      display: grid;
      place-items: center;
      padding: 36px;
      background:
        linear-gradient(45deg, rgba(15, 23, 42, 0.11) 25%, transparent 25%, transparent 75%, rgba(15, 23, 42, 0.11) 75%),
        linear-gradient(45deg, rgba(15, 23, 42, 0.11) 25%, transparent 25%, transparent 75%, rgba(15, 23, 42, 0.11) 75%),
        #eef2f7;
      background-position: 0 0, 16px 16px, 0 0;
      background-size: 32px 32px, 32px 32px, auto;
    }

    .pattern img {
      display: block;
      width: min(780px, 100%);
      height: auto;
      border: 1px solid #cbd5e1;
      background: #f7f8fa;
      box-shadow: 0 18px 60px rgba(15, 23, 42, 0.12);
      opacity: var(--pattern-opacity, 0.65);
      transition: opacity 120ms ease;
    }

    .opacity-control {
      position: absolute;
      right: 18px;
      bottom: 18px;
      width: min(180px, calc(100% - 36px));
      height: 28px;
      display: grid;
      place-items: center;
      padding: 0 10px;
      border: 1px solid rgba(15, 23, 42, 0.14);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(8px);
    }

    .opacity-control input {
      width: 100%;
      accent-color: #64748b;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .bars {
        height: 64px;
      }

      .pattern {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="bars" aria-hidden="true">
      <img src="/error-assets/smpte-color-bars.png" alt="">
    </div>
    <div class="pattern" aria-hidden="true">
      <img src="/error-assets/friendly-error-test-pattern.png" alt="">
    </div>
    <div class="opacity-control">
      <input type="range" min="0.2" max="1" step="0.01" value="0.65" aria-label="Opacity">
    </div>
  </main>
  <script>
    const slider = document.querySelector('.opacity-control input');
    slider.addEventListener('input', () => {
      document.documentElement.style.setProperty('--pattern-opacity', slider.value);
    });
  </script>
</body>
</html>
