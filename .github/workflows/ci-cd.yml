name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: windows-2025-vs2026

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify repository safety rules
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $trackedPmFiles = @(git ls-files 'pm/**')
          if ($trackedPmFiles.Count -gt 0) {
            throw "The pm/ folder must not be tracked. Files found: $($trackedPmFiles -join ', ')"
          }

          $pmHistory = @(git log --all --name-only --pretty=format: -- pm | Where-Object { $_ })
          if ($pmHistory.Count -gt 0) {
            $uniquePmHistory = @($pmHistory | Sort-Object -Unique)
            throw "The pm/ folder must not appear in branch history. Files found: $($uniquePmHistory -join ', ')"
          }

          $allowedAgentFiles = @('AGENTS.md')
          $trackedAgentFiles = @(git ls-files | Where-Object { $_ -eq 'AGENTS.md' -or $_ -like '*/AGENTS.md' })
          $unexpectedAgentFiles = @($trackedAgentFiles | Where-Object { $_ -notin $allowedAgentFiles })
          $missingAgentFiles = @($allowedAgentFiles | Where-Object { $_ -notin $trackedAgentFiles })

          if ($unexpectedAgentFiles.Count -gt 0) {
            throw "Unexpected tracked AGENTS.md files found: $($unexpectedAgentFiles -join ', ')"
          }

          if ($missingAgentFiles.Count -gt 0) {
            throw "Expected tracked AGENTS.md files are missing: $($missingAgentFiles -join ', ')"
          }

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore node_modules cache
        id: node-modules-cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package.json', 'package-lock.json') }}

      - name: Initialize CI timing summary
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          @(
            '## Checknote CI Timing',
            '',
            '| Signal | Value |',
            '| --- | ---: |'
          ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

      - name: Record node_modules cache restore
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $cacheHit = '${{ steps.node-modules-cache.outputs.cache-hit }}'
          $matchedKey = '${{ steps.node-modules-cache.outputs.cache-matched-key }}'
          if ([string]::IsNullOrWhiteSpace($cacheHit)) {
            $cacheHit = 'false'
          }
          if ([string]::IsNullOrWhiteSpace($matchedKey)) {
            $matchedKey = 'none'
          }
          '| node_modules cache restore | hit={0}; matched={1} |' -f $cacheHit, $matchedKey | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

      - name: Restore Bazel caches
        id: bazel-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ runner.temp }}/checknote-bazel-disk-cache
            ${{ runner.temp }}/checknote-bazel-repository-cache
            ${{ runner.temp }}/checknote-bazelisk
          key: bazel-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock', 'package.json', 'package-lock.json', '**/BUILD.bazel', 'tools/**/*.bzl', 'tools/**/*.mjs', 'tools/**/*.ps1') }}
          restore-keys: |
            bazel-v2-${{ runner.os }}-${{ runner.arch }}-
            bazel-${{ runner.os }}-${{ runner.arch }}-

      - name: Record Bazel caches restore
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $cacheHit = '${{ steps.bazel-cache.outputs.cache-hit }}'
          $matchedKey = '${{ steps.bazel-cache.outputs.cache-matched-key }}'
          if ([string]::IsNullOrWhiteSpace($cacheHit)) {
            $cacheHit = 'false'
          }
          if ([string]::IsNullOrWhiteSpace($matchedKey)) {
            $matchedKey = 'none'
          }
          '| Bazel caches restore | hit={0}; matched={1} |' -f $cacheHit, $matchedKey | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

      - name: Configure Bazel caches
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $diskCachePath = Join-Path $env:RUNNER_TEMP 'checknote-bazel-disk-cache'
          $repositoryCachePath = Join-Path $env:RUNNER_TEMP 'checknote-bazel-repository-cache'
          $bazeliskHome = Join-Path $env:RUNNER_TEMP 'checknote-bazelisk'
          New-Item -ItemType Directory -Force -Path $diskCachePath, $repositoryCachePath, $bazeliskHome | Out-Null

          $diskCacheBazelPath = $diskCachePath.Replace('\', '/')
          $repositoryCacheBazelPath = $repositoryCachePath.Replace('\', '/')
          $userBazelRcPath = Join-Path $HOME '.bazelrc'
          @(
            "build --disk_cache=$diskCacheBazelPath",
            "build --repository_cache=$repositoryCacheBazelPath",
            "build --show_progress_rate_limit=15"
          ) | Set-Content -LiteralPath $userBazelRcPath -Encoding utf8
          "BAZELISK_HOME=$bazeliskHome" | Add-Content -LiteralPath $env:GITHUB_ENV

          Write-Host "Configured Bazel disk cache at $diskCachePath"
          Write-Host "Configured Bazel repository cache at $repositoryCachePath"
          Write-Host "Configured Bazelisk home at $bazeliskHome"

      - name: Install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $nodeModulesCacheHit = '${{ steps.node-modules-cache.outputs.cache-hit }}'
          if ($nodeModulesCacheHit -eq 'true') {
            $expectedPackages = @(
              'node_modules/@angular/core/package.json',
              'node_modules/@bazel/bazelisk/package.json',
              'node_modules/typescript/package.json'
            )
            $missingPackages = @($expectedPackages | Where-Object { !(Test-Path $_) })
            if ($missingPackages.Count -gt 0) {
              throw "node_modules cache hit, but expected packages were missing: $($missingPackages -join ', ')"
            }

            '| npm ci --prefer-offline --no-audit --no-fund --ignore-scripts | skipped; node_modules cache hit |' | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
            exit 0
          }

          $duration = Measure-Command {
            npm ci --prefer-offline --no-audit --no-fund --ignore-scripts
            if ($LASTEXITCODE -ne 0) {
              throw "npm ci failed with exit code $LASTEXITCODE."
            }
          }
          '| npm ci --prefer-offline --no-audit --no-fund --ignore-scripts | {0:n1}s |' -f $duration.TotalSeconds | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

      - name: Save node_modules cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.node-modules-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package.json', 'package-lock.json') }}

      - name: Build and test with Bazel
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $duration = Measure-Command {
            npm run ci:build-and-test
            if ($LASTEXITCODE -ne 0) {
              throw "npm run ci:build-and-test failed with exit code $LASTEXITCODE."
            }
          }
          '| npm run ci:build-and-test | {0:n1}s |' -f $duration.TotalSeconds | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

      - name: Stage deploy artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bazelisk = Join-Path $PWD.Path 'node_modules\.bin\bazelisk.cmd'
          $bazelBin = (& $bazelisk info bazel-bin).Trim()
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          $artifacts = @(
            @{
              Source = Join-Path $bazelBin 'api\src\App\checknote-site.zip'
              Destination = 'artifacts/checknote-site.zip'
              Description = 'site'
            },
            @{
              Source = Join-Path $bazelBin 'deployment\database\checknote-db-tool.zip'
              Destination = 'artifacts/checknote-db-tool.zip'
              Description = 'database tool'
            },
            @{
              Source = Join-Path $bazelBin 'tools\auth-smoke\checknote-auth-smoke.zip'
              Destination = 'artifacts/checknote-auth-smoke.zip'
              Description = 'auth smoke tool'
            }
          )

          foreach ($artifact in $artifacts) {
            if (!(Test-Path $artifact.Source)) {
              throw "Expected Bazel $($artifact.Description) artifact was not found: $($artifact.Source)"
            }
            Copy-Item -LiteralPath $artifact.Source -Destination $artifact.Destination -Force
          }

      - name: Save Bazel caches
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.bazel-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ runner.temp }}/checknote-bazel-disk-cache
            ${{ runner.temp }}/checknote-bazel-repository-cache
            ${{ runner.temp }}/checknote-bazelisk
          key: bazel-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock', 'package.json', 'package-lock.json', '**/BUILD.bazel', 'tools/**/*.bzl', 'tools/**/*.mjs', 'tools/**/*.ps1') }}

      - name: Upload Checknote site artifact
        uses: actions/upload-artifact@v7
        with:
          path: artifacts/checknote-site.zip
          archive: false
          if-no-files-found: error
          retention-days: 14

      - name: Upload Checknote database tool artifact
        uses: actions/upload-artifact@v7
        with:
          path: artifacts/checknote-db-tool.zip
          archive: false
          if-no-files-found: error
          retention-days: 14

      - name: Upload Checknote auth smoke artifact
        uses: actions/upload-artifact@v7
        with:
          path: artifacts/checknote-auth-smoke.zip
          archive: false
          if-no-files-found: error
          retention-days: 14

  deploy:
    name: Deploy to web server
    runs-on: windows-2025-vs2026
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Download Checknote site artifact
        uses: actions/download-artifact@v8
        with:
          name: checknote-site.zip
          path: artifact/site
          skip-decompress: true

      - name: Download Checknote database tool artifact
        uses: actions/download-artifact@v8
        with:
          name: checknote-db-tool.zip
          path: artifact/db-tool
          skip-decompress: true

      - name: Download Checknote auth smoke artifact
        uses: actions/download-artifact@v8
        with:
          name: checknote-auth-smoke.zip
          path: artifact/auth-smoke
          skip-decompress: true

      - name: Unpack Checknote site
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $siteZip = @('artifact/site/checknote-site.zip', 'artifact/site') |
            Where-Object { Test-Path $_ -PathType Leaf } |
            Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($siteZip)) {
            throw 'Expected downloaded site artifact was not found.'
          }

          New-Item -ItemType Directory -Force -Path deploy | Out-Null
          tar -xf $siteZip -C deploy
          if ($LASTEXITCODE -ne 0) {
            throw "Could not unpack $siteZip."
          }
          if (!(Test-Path deploy/web.config)) {
            throw 'Expected deploy/web.config was not found.'
          }
          if (!(Test-Path deploy/wwwroot/index.html)) {
            throw 'Expected deploy/wwwroot/index.html was not found.'
          }
          $indexHtml = Get-Content deploy/wwwroot/index.html -Raw
          if ($indexHtml -notmatch '<script[^>]+src="[^"]+\.js"') {
            throw 'Expected deploy/wwwroot/index.html to reference a JavaScript bundle.'
          }
          $apiExe = @(Get-ChildItem -Path deploy -Filter *.exe -File)
          if ($apiExe.Count -eq 0) {
            throw 'Expected the API publish output to include an executable.'
          }

      - name: Verify Checknote database tool artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $artifactPath = @('artifact/db-tool/checknote-db-tool.zip', 'artifact/db-tool') |
            Where-Object { Test-Path $_ -PathType Leaf } |
            Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($artifactPath)) {
            throw 'Expected database tool artifact was not found.'
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [IO.Compression.ZipFile]::OpenRead((Resolve-Path $artifactPath).Path)
          try {
            $toolEntry = $zip.Entries | Where-Object { $_.FullName -eq 'checknote_db_tool.exe' } | Select-Object -First 1
            if ($null -eq $toolEntry) {
              throw 'Expected database tool artifact to contain checknote_db_tool.exe.'
            }
          }
          finally {
            $zip.Dispose()
          }

      - name: Configure SSH
        env:
          WEB_SERVER_HOST: ${{ secrets.WEB_SERVER_HOST }}
          WEB_SERVER_SSH_KEY_B64: ${{ secrets.WEB_SERVER_SSH_KEY_B64 }}
          WEB_SERVER_PORT: ${{ secrets.WEB_SERVER_PORT }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path ~/.ssh | Out-Null
          $keyPath = Join-Path $HOME '.ssh/web_server_deploy_key'
          [IO.File]::WriteAllBytes($keyPath, [Convert]::FromBase64String($env:WEB_SERVER_SSH_KEY_B64))

      - name: Upload staged files
        timeout-minutes: 5
        env:
          WEB_SERVER_HOST: ${{ secrets.WEB_SERVER_HOST }}
          WEB_SERVER_USERNAME: ${{ secrets.WEB_SERVER_USERNAME }}
          WEB_SERVER_PORT: ${{ secrets.WEB_SERVER_PORT }}
          WEB_SERVER_REMOTE_PATH: ${{ secrets.WEB_SERVER_REMOTE_PATH }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $keyPath = Join-Path $HOME '.ssh/web_server_deploy_key'
          $remoteDeployPath = "$env:WEB_SERVER_REMOTE_PATH/.deploy/$env:GITHUB_SHA"
          $remoteZipPath = "$remoteDeployPath/checknote-site.zip"
          $remoteDbToolZipPath = "$remoteDeployPath/checknote-db-tool.zip"
          $remote = "$env:WEB_SERVER_USERNAME@$env:WEB_SERVER_HOST"
          $sshOptions = @('-o', 'BatchMode=yes', '-o', 'StrictHostKeyChecking=accept-new', '-o', 'ConnectTimeout=30', '-o', 'ServerAliveInterval=15', '-o', 'ServerAliveCountMax=4')
          Write-Host "::add-mask::$remoteDeployPath"
          Write-Host "::add-mask::$remoteZipPath"
          Write-Host "::add-mask::$remoteDbToolZipPath"
          Write-Host "::add-mask::$remote"

          $siteZip = @('artifact/site/checknote-site.zip', 'artifact/site') |
            Where-Object { Test-Path $_ -PathType Leaf } |
            Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($siteZip)) {
            throw 'Expected downloaded site artifact was not found.'
          }

          $dbToolZip = @('artifact/db-tool/checknote-db-tool.zip', 'artifact/db-tool') |
            Where-Object { Test-Path $_ -PathType Leaf } |
            Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($dbToolZip)) {
            throw 'Expected downloaded database tool artifact was not found.'
          }

          Copy-Item -LiteralPath $siteZip -Destination checknote-site.zip -Force
          Copy-Item -LiteralPath $dbToolZip -Destination checknote-db-tool.zip -Force
          ssh @sshOptions -i $keyPath -p $env:WEB_SERVER_PORT $remote "powershell -NoProfile -ExecutionPolicy Bypass -Command `"New-Item -ItemType Directory -Force -Path '$remoteDeployPath' | Out-Null`""
          scp @sshOptions -i $keyPath -P $env:WEB_SERVER_PORT checknote-site.zip "${remote}:$remoteZipPath"
          scp @sshOptions -i $keyPath -P $env:WEB_SERVER_PORT checknote-db-tool.zip "${remote}:$remoteDbToolZipPath"

      - name: Apply database model
        timeout-minutes: 5
        env:
          WEB_SERVER_HOST: ${{ secrets.WEB_SERVER_HOST }}
          WEB_SERVER_USERNAME: ${{ secrets.WEB_SERVER_USERNAME }}
          WEB_SERVER_PORT: ${{ secrets.WEB_SERVER_PORT }}
          WEB_SERVER_REMOTE_PATH: ${{ secrets.WEB_SERVER_REMOTE_PATH }}
          CHECKNOTE_DATABASE_CONNECTION_STRING: ${{ secrets.CHECKNOTE_DATABASE_CONNECTION_STRING }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:CHECKNOTE_DATABASE_CONNECTION_STRING)) {
            throw 'CHECKNOTE_DATABASE_CONNECTION_STRING secret must be set.'
          }

          $keyPath = Join-Path $HOME '.ssh/web_server_deploy_key'
          $remoteDeployPath = "$env:WEB_SERVER_REMOTE_PATH/.deploy/$env:GITHUB_SHA"
          $remote = "$env:WEB_SERVER_USERNAME@$env:WEB_SERVER_HOST"
          $sshOptions = @('-o', 'BatchMode=yes', '-o', 'StrictHostKeyChecking=accept-new', '-o', 'ConnectTimeout=30', '-o', 'ServerAliveInterval=15', '-o', 'ServerAliveCountMax=4')
          $connectionStringB64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($env:CHECKNOTE_DATABASE_CONNECTION_STRING))
          Write-Host "::add-mask::$remoteDeployPath"
          Write-Host "::add-mask::$remote"
          Write-Host "::add-mask::$connectionStringB64"
          $applyScript = @"
          `$ErrorActionPreference = 'Stop'
          `$stage = '$remoteDeployPath'
          `$toolRoot = Join-Path `$stage 'db-tool'
          if (Test-Path `$toolRoot) {
            Remove-Item -LiteralPath `$toolRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path `$toolRoot | Out-Null
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [IO.Compression.ZipFile]::ExtractToDirectory((Join-Path `$stage 'checknote-db-tool.zip'), `$toolRoot)
          `$toolPath = Join-Path `$toolRoot 'checknote_db_tool.exe'
          if (!(Test-Path `$toolPath)) {
            throw 'Expected database tool executable was not found on the server.'
          }
          # TODO: Back up the production database immediately before this apply step.
          `$env:CHECKNOTE_DATABASE_CONNECTION_STRING = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String('$connectionStringB64'))
          `$env:CHECKNOTE_DEPLOYMENT_ENVIRONMENT = 'production'
          & `$toolPath apply
          if (`$LASTEXITCODE -ne 0) {
            exit `$LASTEXITCODE
          }
          "@
          $encodedScript = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($applyScript))
          Write-Host "::add-mask::$encodedScript"
          ssh @sshOptions -i $keyPath -p $env:WEB_SERVER_PORT $remote "powershell -NoProfile -ExecutionPolicy Bypass -EncodedCommand $encodedScript"

      - name: Publish staged files
        timeout-minutes: 5
        env:
          WEB_SERVER_HOST: ${{ secrets.WEB_SERVER_HOST }}
          WEB_SERVER_USERNAME: ${{ secrets.WEB_SERVER_USERNAME }}
          WEB_SERVER_PORT: ${{ secrets.WEB_SERVER_PORT }}
          WEB_SERVER_REMOTE_PATH: ${{ secrets.WEB_SERVER_REMOTE_PATH }}
          CHECKNOTE_DATABASE_CONNECTION_STRING: ${{ secrets.CHECKNOTE_DATABASE_CONNECTION_STRING }}
          CHECKNOTE_SEQ_SERVER_URL: ${{ secrets.CHECKNOTE_SEQ_SERVER_URL }}
          CHECKNOTE_SEQ_API_KEY: ${{ secrets.CHECKNOTE_SEQ_API_KEY }}
          CHECKNOTE_AUTHENTICATION_AUDIENCE: ${{ vars.CHECKNOTE_AUTHENTICATION_AUDIENCE }}
          CHECKNOTE_AUTHENTICATION_METADATA_ADDRESS: ${{ vars.CHECKNOTE_AUTHENTICATION_METADATA_ADDRESS }}
          CHECKNOTE_AUTHENTICATION_VALID_ISSUER: ${{ vars.CHECKNOTE_AUTHENTICATION_VALID_ISSUER }}
          CHECKNOTE_AUTHENTICATION_REQUIRE_HTTPS_METADATA: ${{ vars.CHECKNOTE_AUTHENTICATION_REQUIRE_HTTPS_METADATA }}
          CHECKNOTE_KEYCLOAK_AUTH_SERVER_URL: ${{ vars.CHECKNOTE_KEYCLOAK_AUTH_SERVER_URL }}
          CHECKNOTE_KEYCLOAK_REALM: ${{ vars.CHECKNOTE_KEYCLOAK_REALM }}
          CHECKNOTE_KEYCLOAK_PUBLIC_CLIENT_ID: ${{ vars.CHECKNOTE_KEYCLOAK_PUBLIC_CLIENT_ID }}
          CHECKNOTE_KEYCLOAK_HEALTH_URL: ${{ vars.CHECKNOTE_KEYCLOAK_HEALTH_URL }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:CHECKNOTE_DATABASE_CONNECTION_STRING)) {
            throw 'CHECKNOTE_DATABASE_CONNECTION_STRING secret must be set.'
          }

          $keyPath = Join-Path $HOME '.ssh/web_server_deploy_key'
          $remoteDeployPath = "$env:WEB_SERVER_REMOTE_PATH/.deploy/$env:GITHUB_SHA"
          $remote = "$env:WEB_SERVER_USERNAME@$env:WEB_SERVER_HOST"
          $sshOptions = @('-o', 'BatchMode=yes', '-o', 'StrictHostKeyChecking=accept-new', '-o', 'ConnectTimeout=30', '-o', 'ServerAliveInterval=15', '-o', 'ServerAliveCountMax=4')
          $connectionStringB64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($env:CHECKNOTE_DATABASE_CONNECTION_STRING))
          Write-Host "::add-mask::$remoteDeployPath"
          Write-Host "::add-mask::$remote"
          Write-Host "::add-mask::$connectionStringB64"
          $seqServerUrlB64 = ''
          if (![string]::IsNullOrWhiteSpace($env:CHECKNOTE_SEQ_SERVER_URL)) {
            $seqServerUrlB64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($env:CHECKNOTE_SEQ_SERVER_URL))
            Write-Host "::add-mask::$seqServerUrlB64"
          }
          $seqApiKeyB64 = ''
          if (![string]::IsNullOrWhiteSpace($env:CHECKNOTE_SEQ_API_KEY)) {
            $seqApiKeyB64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($env:CHECKNOTE_SEQ_API_KEY))
            Write-Host "::add-mask::$seqApiKeyB64"
          }
          function Convert-ToBase64OrEmpty {
            param([string] $Value)

            if ([string]::IsNullOrWhiteSpace($Value)) {
              return ''
            }

            return [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($Value))
          }

          $authenticationAudienceB64 = Convert-ToBase64OrEmpty $env:CHECKNOTE_AUTHENTICATION_AUDIENCE
          $authenticationMetadataAddressB64 = Convert-ToBase64OrEmpty $env:CHECKNOTE_AUTHENTICATION_METADATA_ADDRESS
          $authenticationValidIssuerB64 = Convert-ToBase64OrEmpty $env:CHECKNOTE_AUTHENTICATION_VALID_ISSUER
          $authenticationRequireHttpsMetadataB64 = Convert-ToBase64OrEmpty $env:CHECKNOTE_AUTHENTICATION_REQUIRE_HTTPS_METADATA
          $keycloakAuthServerUrlB64 = Convert-ToBase64OrEmpty $env:CHECKNOTE_KEYCLOAK_AUTH_SERVER_URL
          $keycloakRealmB64 = Convert-ToBase64OrEmpty $env:CHECKNOTE_KEYCLOAK_REALM
          $keycloakPublicClientIdB64 = Convert-ToBase64OrEmpty $env:CHECKNOTE_KEYCLOAK_PUBLIC_CLIENT_ID
          $keycloakHealthUrlB64 = Convert-ToBase64OrEmpty $env:CHECKNOTE_KEYCLOAK_HEALTH_URL
          foreach ($encodedAuthValue in @(
            $authenticationAudienceB64,
            $authenticationMetadataAddressB64,
            $authenticationValidIssuerB64,
            $authenticationRequireHttpsMetadataB64,
            $keycloakAuthServerUrlB64,
            $keycloakRealmB64,
            $keycloakPublicClientIdB64,
            $keycloakHealthUrlB64
          )) {
            if (![string]::IsNullOrWhiteSpace($encodedAuthValue)) {
              Write-Host "::add-mask::$encodedAuthValue"
            }
          }
          $remotePublishScriptPath = "$remoteDeployPath/publish-site.ps1"
          Write-Host "::add-mask::$remotePublishScriptPath"
          $publishScript = @'
          param(
            [Parameter(Mandatory = $true)]
            [string] $Site,
            [Parameter(Mandatory = $true)]
            [string] $Stage,
            [Parameter(Mandatory = $true)]
            [string] $ConnectionStringB64,
            [string] $SeqServerUrlB64 = '',
            [string] $SeqApiKeyB64 = '',
            [string] $AuthenticationAudienceB64 = '',
            [string] $AuthenticationMetadataAddressB64 = '',
            [string] $AuthenticationValidIssuerB64 = '',
            [string] $AuthenticationRequireHttpsMetadataB64 = '',
            [string] $KeycloakAuthServerUrlB64 = '',
            [string] $KeycloakRealmB64 = '',
            [string] $KeycloakPublicClientIdB64 = '',
            [string] $KeycloakHealthUrlB64 = ''
          )

          $ErrorActionPreference = 'Stop'

          function Set-WebConfigEnvironmentVariable {
            param(
              [xml] $WebConfig,
              $EnvironmentVariables,
              [string] $Name,
              [string] $Value
            )

            $variable = $EnvironmentVariables.environmentVariable | Where-Object { $_.name -eq $Name } | Select-Object -First 1
            if ($null -eq $variable) {
              $variable = $WebConfig.CreateElement('environmentVariable')
              [void] $EnvironmentVariables.AppendChild($variable)
            }

            $variable.SetAttribute('name', $Name)
            $variable.SetAttribute('value', $Value)
          }

          function Get-DecodedValueOrEmpty {
            param([string] $ValueB64)

            if ([string]::IsNullOrWhiteSpace($ValueB64)) {
              return ''
            }

            return [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($ValueB64))
          }

          $expanded = Join-Path $Stage 'site'
          $backup = Join-Path $Site ('.backups/' + (Get-Date -Format 'yyyyMMddHHmmss'))
          if (Test-Path $expanded) {
            Remove-Item -LiteralPath $expanded -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $Site, $backup, $expanded | Out-Null
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [IO.Compression.ZipFile]::ExtractToDirectory((Join-Path $Stage 'checknote-site.zip'), $expanded)
          if (!(Test-Path (Join-Path $expanded 'web.config'))) {
            throw 'Expected site artifact web.config was not found.'
          }
          if (!(Test-Path (Join-Path $expanded 'wwwroot\index.html'))) {
            throw 'Expected site artifact wwwroot/index.html was not found.'
          }

          $webConfigPath = Join-Path $expanded 'web.config'
          [xml] $webConfig = Get-Content -LiteralPath $webConfigPath
          $aspNetCore = $webConfig.configuration.'system.webServer'.aspNetCore
          $environmentVariables = $aspNetCore.environmentVariables
          if ($null -eq $environmentVariables) {
            $environmentVariables = $webConfig.CreateElement('environmentVariables')
            [void] $aspNetCore.AppendChild($environmentVariables)
          }

          $connectionString = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($ConnectionStringB64))
          Set-WebConfigEnvironmentVariable -WebConfig $webConfig -EnvironmentVariables $environmentVariables -Name 'CHECKNOTE_DATABASE_CONNECTION_STRING' -Value $connectionString
          if (![string]::IsNullOrWhiteSpace($SeqServerUrlB64)) {
            $seqServerUrl = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($SeqServerUrlB64))
            Set-WebConfigEnvironmentVariable -WebConfig $webConfig -EnvironmentVariables $environmentVariables -Name 'CHECKNOTE_SEQ_SERVER_URL' -Value $seqServerUrl
          }
          if (![string]::IsNullOrWhiteSpace($SeqApiKeyB64)) {
            $seqApiKey = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($SeqApiKeyB64))
            Set-WebConfigEnvironmentVariable -WebConfig $webConfig -EnvironmentVariables $environmentVariables -Name 'CHECKNOTE_SEQ_API_KEY' -Value $seqApiKey
          }

          $authenticationAudience = Get-DecodedValueOrEmpty $AuthenticationAudienceB64
          if (![string]::IsNullOrWhiteSpace($authenticationAudience)) {
            Set-WebConfigEnvironmentVariable -WebConfig $webConfig -EnvironmentVariables $environmentVariables -Name 'Authentication__Audience' -Value $authenticationAudience
          }
          $authenticationMetadataAddress = Get-DecodedValueOrEmpty $AuthenticationMetadataAddressB64
          if (![string]::IsNullOrWhiteSpace($authenticationMetadataAddress)) {
            Set-WebConfigEnvironmentVariable -WebConfig $webConfig -EnvironmentVariables $environmentVariables -Name 'Authentication__MetadataAddress' -Value $authenticationMetadataAddress
          }
          $authenticationValidIssuer = Get-DecodedValueOrEmpty $AuthenticationValidIssuerB64
          if (![string]::IsNullOrWhiteSpace($authenticationValidIssuer)) {
            Set-WebConfigEnvironmentVariable -WebConfig $webConfig -EnvironmentVariables $environmentVariables -Name 'Authentication__TokenValidationParameters__ValidIssuers__0' -Value $authenticationValidIssuer
          }
          $authenticationRequireHttpsMetadata = Get-DecodedValueOrEmpty $AuthenticationRequireHttpsMetadataB64
          if (![string]::IsNullOrWhiteSpace($authenticationRequireHttpsMetadata)) {
            Set-WebConfigEnvironmentVariable -WebConfig $webConfig -EnvironmentVariables $environmentVariables -Name 'Authentication__RequireHttpsMetadata' -Value $authenticationRequireHttpsMetadata
          }
          $keycloakAuthServerUrl = Get-DecodedValueOrEmpty $KeycloakAuthServerUrlB64
          if (![string]::IsNullOrWhiteSpace($keycloakAuthServerUrl)) {
            Set-WebConfigEnvironmentVariable -WebConfig $webConfig -EnvironmentVariables $environmentVariables -Name 'Keycloak__AuthServerUrl' -Value $keycloakAuthServerUrl
          }
          $keycloakRealm = Get-DecodedValueOrEmpty $KeycloakRealmB64
          if (![string]::IsNullOrWhiteSpace($keycloakRealm)) {
            Set-WebConfigEnvironmentVariable -WebConfig $webConfig -EnvironmentVariables $environmentVariables -Name 'Keycloak__Realm' -Value $keycloakRealm
          }
          $keycloakPublicClientId = Get-DecodedValueOrEmpty $KeycloakPublicClientIdB64
          if (![string]::IsNullOrWhiteSpace($keycloakPublicClientId)) {
            Set-WebConfigEnvironmentVariable -WebConfig $webConfig -EnvironmentVariables $environmentVariables -Name 'Keycloak__PublicClientId' -Value $keycloakPublicClientId
          }
          $keycloakHealthUrl = Get-DecodedValueOrEmpty $KeycloakHealthUrlB64
          if (![string]::IsNullOrWhiteSpace($keycloakHealthUrl)) {
            Set-WebConfigEnvironmentVariable -WebConfig $webConfig -EnvironmentVariables $environmentVariables -Name 'Keycloak__HealthUrl' -Value $keycloakHealthUrl
          }

          $webConfig.Save($webConfigPath)
          Set-Content -LiteralPath (Join-Path $Site 'app_offline.htm') -Value 'Deploying Checknote' -NoNewline
          Start-Sleep -Seconds 2
          Get-ChildItem -LiteralPath $Site -Force | Where-Object {
            $_.Name -notin @('.deploy', '.backups', '.htaccess')
          } | ForEach-Object {
            Move-Item -LiteralPath $_.FullName -Destination $backup -Force
          }
          Copy-Item -Path (Join-Path $expanded '*') -Destination $Site -Recurse -Force
          '@
          Set-Content -LiteralPath publish-site.ps1 -Value $publishScript -Encoding UTF8
          scp @sshOptions -i $keyPath -P $env:WEB_SERVER_PORT publish-site.ps1 "${remote}:$remotePublishScriptPath"
          $publishCommand = 'powershell -NoProfile -ExecutionPolicy Bypass -File "' + $remotePublishScriptPath + '" -Site "' + $env:WEB_SERVER_REMOTE_PATH + '" -Stage "' + $remoteDeployPath + '" -ConnectionStringB64 "' + $connectionStringB64 + '" -SeqServerUrlB64 "' + $seqServerUrlB64 + '" -SeqApiKeyB64 "' + $seqApiKeyB64 + '" -AuthenticationAudienceB64 "' + $authenticationAudienceB64 + '" -AuthenticationMetadataAddressB64 "' + $authenticationMetadataAddressB64 + '" -AuthenticationValidIssuerB64 "' + $authenticationValidIssuerB64 + '" -AuthenticationRequireHttpsMetadataB64 "' + $authenticationRequireHttpsMetadataB64 + '" -KeycloakAuthServerUrlB64 "' + $keycloakAuthServerUrlB64 + '" -KeycloakRealmB64 "' + $keycloakRealmB64 + '" -KeycloakPublicClientIdB64 "' + $keycloakPublicClientIdB64 + '" -KeycloakHealthUrlB64 "' + $keycloakHealthUrlB64 + '"'
          Write-Host "::add-mask::$publishCommand"
          ssh @sshOptions -i $keyPath -p $env:WEB_SERVER_PORT $remote $publishCommand

      - name: Verify Seq deployment configuration
        timeout-minutes: 5
        env:
          WEB_SERVER_HOST: ${{ secrets.WEB_SERVER_HOST }}
          WEB_SERVER_USERNAME: ${{ secrets.WEB_SERVER_USERNAME }}
          WEB_SERVER_PORT: ${{ secrets.WEB_SERVER_PORT }}
          WEB_SERVER_REMOTE_PATH: ${{ secrets.WEB_SERVER_REMOTE_PATH }}
          CHECKNOTE_SEQ_SERVER_URL: ${{ secrets.CHECKNOTE_SEQ_SERVER_URL }}
          CHECKNOTE_SEQ_API_KEY: ${{ secrets.CHECKNOTE_SEQ_API_KEY }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:CHECKNOTE_SEQ_SERVER_URL)) {
            Write-Host 'CHECKNOTE_SEQ_SERVER_URL is not configured; skipping Seq deployment configuration verification.'
            exit 0
          }

          $keyPath = Join-Path $HOME '.ssh/web_server_deploy_key'
          $remote = "$env:WEB_SERVER_USERNAME@$env:WEB_SERVER_HOST"
          $sshOptions = @('-o', 'BatchMode=yes', '-o', 'StrictHostKeyChecking=accept-new', '-o', 'ConnectTimeout=30', '-o', 'ServerAliveInterval=15', '-o', 'ServerAliveCountMax=4')
          $seqServerUrlB64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($env:CHECKNOTE_SEQ_SERVER_URL))
          $seqApiKeyRequired = ![string]::IsNullOrWhiteSpace($env:CHECKNOTE_SEQ_API_KEY)
          Write-Host "::add-mask::$remote"
          Write-Host "::add-mask::$seqServerUrlB64"
          $verifyScript = @"
          `$ErrorActionPreference = 'Stop'
          `$webConfigPath = Join-Path '$env:WEB_SERVER_REMOTE_PATH' 'web.config'
          if (!(Test-Path `$webConfigPath)) {
            throw 'Expected deployed web.config was not found.'
          }

          [xml]`$webConfig = Get-Content -LiteralPath `$webConfigPath
          `$environmentVariables = `$webConfig.configuration.'system.webServer'.aspNetCore.environmentVariables
          if (`$null -eq `$environmentVariables) {
            throw 'Deployed web.config is missing aspNetCore environmentVariables.'
          }

          `$seqServerUrl = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String('$seqServerUrlB64'))
          `$seqServerUrlVariable = `$environmentVariables.environmentVariable | Where-Object { `$_.name -eq 'CHECKNOTE_SEQ_SERVER_URL' } | Select-Object -First 1
          if (`$null -eq `$seqServerUrlVariable) {
            throw 'CHECKNOTE_SEQ_SERVER_URL is configured in GitHub, but missing from deployed web.config.'
          }
          if ([string]::IsNullOrWhiteSpace(`$seqServerUrlVariable.value)) {
            throw 'CHECKNOTE_SEQ_SERVER_URL is present in deployed web.config, but has no value.'
          }
          if (`$seqServerUrlVariable.value -ne `$seqServerUrl) {
            throw 'CHECKNOTE_SEQ_SERVER_URL in deployed web.config does not match the configured production secret.'
          }

          if ('$seqApiKeyRequired' -eq 'True') {
            `$seqApiKeyVariable = `$environmentVariables.environmentVariable | Where-Object { `$_.name -eq 'CHECKNOTE_SEQ_API_KEY' } | Select-Object -First 1
            if (`$null -eq `$seqApiKeyVariable -or [string]::IsNullOrWhiteSpace(`$seqApiKeyVariable.value)) {
              throw 'CHECKNOTE_SEQ_API_KEY is configured in GitHub, but missing or empty in deployed web.config.'
            }
          }

          Write-Host 'Verified Seq environment variables in deployed web.config.'
          "@
          $encodedScript = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($verifyScript))
          Write-Host "::add-mask::$encodedScript"
          ssh @sshOptions -i $keyPath -p $env:WEB_SERVER_PORT $remote "powershell -NoProfile -ExecutionPolicy Bypass -EncodedCommand $encodedScript"

      - name: Verify authentication deployment configuration
        timeout-minutes: 5
        env:
          WEB_SERVER_HOST: ${{ secrets.WEB_SERVER_HOST }}
          WEB_SERVER_USERNAME: ${{ secrets.WEB_SERVER_USERNAME }}
          WEB_SERVER_PORT: ${{ secrets.WEB_SERVER_PORT }}
          WEB_SERVER_REMOTE_PATH: ${{ secrets.WEB_SERVER_REMOTE_PATH }}
          CHECKNOTE_AUTHENTICATION_AUDIENCE: ${{ vars.CHECKNOTE_AUTHENTICATION_AUDIENCE }}
          CHECKNOTE_AUTHENTICATION_METADATA_ADDRESS: ${{ vars.CHECKNOTE_AUTHENTICATION_METADATA_ADDRESS }}
          CHECKNOTE_AUTHENTICATION_VALID_ISSUER: ${{ vars.CHECKNOTE_AUTHENTICATION_VALID_ISSUER }}
          CHECKNOTE_AUTHENTICATION_REQUIRE_HTTPS_METADATA: ${{ vars.CHECKNOTE_AUTHENTICATION_REQUIRE_HTTPS_METADATA }}
          CHECKNOTE_KEYCLOAK_AUTH_SERVER_URL: ${{ vars.CHECKNOTE_KEYCLOAK_AUTH_SERVER_URL }}
          CHECKNOTE_KEYCLOAK_REALM: ${{ vars.CHECKNOTE_KEYCLOAK_REALM }}
          CHECKNOTE_KEYCLOAK_PUBLIC_CLIENT_ID: ${{ vars.CHECKNOTE_KEYCLOAK_PUBLIC_CLIENT_ID }}
          CHECKNOTE_KEYCLOAK_HEALTH_URL: ${{ vars.CHECKNOTE_KEYCLOAK_HEALTH_URL }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:CHECKNOTE_AUTHENTICATION_METADATA_ADDRESS)) {
            Write-Host 'CHECKNOTE_AUTHENTICATION_METADATA_ADDRESS is not configured; skipping authentication deployment configuration verification.'
            exit 0
          }

          $keyPath = Join-Path $HOME '.ssh/web_server_deploy_key'
          $remote = "$env:WEB_SERVER_USERNAME@$env:WEB_SERVER_HOST"
          $sshOptions = @('-o', 'BatchMode=yes', '-o', 'StrictHostKeyChecking=accept-new', '-o', 'ConnectTimeout=30', '-o', 'ServerAliveInterval=15', '-o', 'ServerAliveCountMax=4')
          Write-Host "::add-mask::$remote"

          function Convert-ToBase64OrEmpty {
            param([string] $Value)

            if ([string]::IsNullOrWhiteSpace($Value)) {
              return ''
            }

            return [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($Value))
          }

          $expectedVariables = @{
            'Authentication__Audience' = Convert-ToBase64OrEmpty $env:CHECKNOTE_AUTHENTICATION_AUDIENCE
            'Authentication__MetadataAddress' = Convert-ToBase64OrEmpty $env:CHECKNOTE_AUTHENTICATION_METADATA_ADDRESS
            'Authentication__TokenValidationParameters__ValidIssuers__0' = Convert-ToBase64OrEmpty $env:CHECKNOTE_AUTHENTICATION_VALID_ISSUER
            'Authentication__RequireHttpsMetadata' = Convert-ToBase64OrEmpty $env:CHECKNOTE_AUTHENTICATION_REQUIRE_HTTPS_METADATA
            'Keycloak__AuthServerUrl' = Convert-ToBase64OrEmpty $env:CHECKNOTE_KEYCLOAK_AUTH_SERVER_URL
            'Keycloak__Realm' = Convert-ToBase64OrEmpty $env:CHECKNOTE_KEYCLOAK_REALM
            'Keycloak__PublicClientId' = Convert-ToBase64OrEmpty $env:CHECKNOTE_KEYCLOAK_PUBLIC_CLIENT_ID
            'Keycloak__HealthUrl' = Convert-ToBase64OrEmpty $env:CHECKNOTE_KEYCLOAK_HEALTH_URL
          }

          foreach ($encodedValue in $expectedVariables.Values) {
            if (![string]::IsNullOrWhiteSpace($encodedValue)) {
              Write-Host "::add-mask::$encodedValue"
            }
          }

          $expectedVariablesJson = $expectedVariables | ConvertTo-Json -Compress
          $expectedVariablesB64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($expectedVariablesJson))
          Write-Host "::add-mask::$expectedVariablesB64"
          $verifyScript = @"
          `$ErrorActionPreference = 'Stop'
          `$webConfigPath = Join-Path '$env:WEB_SERVER_REMOTE_PATH' 'web.config'
          if (!(Test-Path `$webConfigPath)) {
            throw 'Expected deployed web.config was not found.'
          }

          `$expectedVariablesJson = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String('$expectedVariablesB64'))
          `$expectedVariables = `$expectedVariablesJson | ConvertFrom-Json
          [xml]`$webConfig = Get-Content -LiteralPath `$webConfigPath
          `$environmentVariables = `$webConfig.configuration.'system.webServer'.aspNetCore.environmentVariables
          if (`$null -eq `$environmentVariables) {
            throw 'Deployed web.config is missing aspNetCore environmentVariables.'
          }

          foreach (`$expectedVariable in `$expectedVariables.PSObject.Properties) {
            if ([string]::IsNullOrWhiteSpace(`$expectedVariable.Value)) {
              continue
            }

            `$name = `$expectedVariable.Name
            `$expectedValue = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(`$expectedVariable.Value))
            `$actualVariable = `$environmentVariables.environmentVariable | Where-Object { `$_.name -eq `$name } | Select-Object -First 1
            if (`$null -eq `$actualVariable) {
              throw "Expected authentication environment variable `$name was not found in deployed web.config."
            }
            if (`$actualVariable.value -ne `$expectedValue) {
              throw "Authentication environment variable `$name does not match the configured production value."
            }
          }

          Write-Host 'Verified authentication environment variables in deployed web.config.'
          "@
          $encodedScript = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($verifyScript))
          Write-Host "::add-mask::$encodedScript"
          ssh @sshOptions -i $keyPath -p $env:WEB_SERVER_PORT $remote "powershell -NoProfile -ExecutionPolicy Bypass -EncodedCommand $encodedScript"

      - name: Verify hello-world API
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = 'https://www.checknote.io/hello-world'
          $expected = 'Hello from Checknote API'
          $deadline = (Get-Date).AddMinutes(5)
          $attempt = 0
          while ((Get-Date) -lt $deadline) {
            $attempt++
            try {
              $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 15
              $body = $response.Content.Trim()
              if ($response.StatusCode -eq 200 -and $body -eq $expected) {
                Write-Host "Verified $url"
                exit 0
              }
              Write-Host "Attempt $attempt returned status $($response.StatusCode) and body '$body'"
            }
            catch {
              Write-Host "Attempt $attempt failed: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds 5
          }
          throw "Expected $url to return '$expected' before the 5-minute readiness deadline."

      - name: Verify Todos API Requires Authentication
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = 'https://www.checknote.io/api/todos'
          for ($attempt = 1; $attempt -le 6; $attempt++) {
            try {
              Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 20 | Out-Null
              Write-Host "Attempt $attempt returned success, expected 401."
            }
            catch {
              $statusCode = $_.Exception.Response.StatusCode.value__
              if ($statusCode -eq 401) {
                Write-Host "Verified $url requires authentication"
                exit 0
              }
              Write-Host "Attempt $attempt failed with status ${statusCode}: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds 5
          }
          throw "Expected $url to require authentication."

      - name: Verify Angular app
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = 'https://www.checknote.io/'
          $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 20
          if ($response.StatusCode -ne 200) {
            throw "Expected $url to return 200 OK."
          }
          if ($response.Content -notmatch '<script[^>]+src="[^"]+\.js"') {
            throw "Expected $url to return the Angular app shell."
          }
          Write-Host "Verified $url"

      - name: Verify authenticated API smoke
        shell: pwsh
        env:
          CHECKNOTE_CHILKAT_LICENSE_KEY: ${{ secrets.CHECKNOTE_CHILKAT_LICENSE_KEY }}
          CHECKNOTE_AUTH_SMOKE_USERNAME: ${{ secrets.CHECKNOTE_AUTH_SMOKE_USERNAME }}
          CHECKNOTE_AUTH_SMOKE_PASSWORD: ${{ secrets.CHECKNOTE_AUTH_SMOKE_PASSWORD }}
          CHECKNOTE_AUTH_SMOKE_CLIENT_SECRET: ${{ secrets.CHECKNOTE_AUTH_SMOKE_CLIENT_SECRET }}
          CHECKNOTE_AUTH_SMOKE_EXPECTED_EMAIL: ${{ secrets.CHECKNOTE_AUTH_SMOKE_EXPECTED_EMAIL }}
          CHECKNOTE_AUTH_SMOKE_KEYCLOAK_BASE_URL: ${{ vars.CHECKNOTE_AUTH_SMOKE_KEYCLOAK_BASE_URL }}
          CHECKNOTE_AUTH_SMOKE_REALM: ${{ vars.CHECKNOTE_AUTH_SMOKE_REALM }}
          CHECKNOTE_AUTH_SMOKE_CLIENT_ID: ${{ vars.CHECKNOTE_AUTH_SMOKE_CLIENT_ID }}
          CHECKNOTE_AUTH_SMOKE_CURRENT_USER_URL: ${{ vars.CHECKNOTE_AUTH_SMOKE_CURRENT_USER_URL }}
          CHECKNOTE_AUTH_SMOKE_TODOS_URL: ${{ vars.CHECKNOTE_AUTH_SMOKE_TODOS_URL }}
          CHECKNOTE_AUTH_SMOKE_EXPECTED_AUDIENCE: ${{ vars.CHECKNOTE_AUTH_SMOKE_EXPECTED_AUDIENCE }}
          CHECKNOTE_AUTH_SMOKE_EXPECTED_NAME: ${{ vars.CHECKNOTE_AUTH_SMOKE_EXPECTED_NAME }}
        run: |
          $ErrorActionPreference = 'Stop'

          $requiredSecretNames = @(
            'CHECKNOTE_CHILKAT_LICENSE_KEY',
            'CHECKNOTE_AUTH_SMOKE_USERNAME',
            'CHECKNOTE_AUTH_SMOKE_PASSWORD'
          )

          $missingSecretNames = @($requiredSecretNames | Where-Object { [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_)) })
          if ($missingSecretNames.Count -gt 0) {
            Write-Host "Skipping authenticated API smoke because required secrets are missing: $($missingSecretNames -join ', ')"
            exit 0
          }

          foreach ($secretName in $requiredSecretNames) {
            Write-Host "::add-mask::$([Environment]::GetEnvironmentVariable($secretName))"
          }
          if (![string]::IsNullOrWhiteSpace($env:CHECKNOTE_AUTH_SMOKE_CLIENT_SECRET)) {
            Write-Host "::add-mask::$env:CHECKNOTE_AUTH_SMOKE_CLIENT_SECRET"
          }

          $artifactPath = @('artifact/auth-smoke/checknote-auth-smoke.zip', 'artifact/auth-smoke') |
            Where-Object { Test-Path $_ -PathType Leaf } |
            Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($artifactPath)) {
            throw 'Expected auth smoke artifact was not found.'
          }

          $runDir = Join-Path $env:RUNNER_TEMP 'checknote-auth-smoke'
          if (Test-Path $runDir) {
            Remove-Item -LiteralPath $runDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $runDir | Out-Null
          Expand-Archive -Path $artifactPath -DestinationPath $runDir -Force

          $exe = Join-Path $runDir 'Checknote.AuthSmoke.exe'
          if (!(Test-Path $exe)) {
            throw 'Expected Checknote.AuthSmoke.exe was not found in the auth smoke artifact.'
          }

          & $exe
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
