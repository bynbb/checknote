<main class="todo-shell">
  <section class="todo-panel" aria-labelledby="todo-title">
    <div class="panel-header">
      <div>
        <p class="eyebrow">Angular + Bazel</p>
        <h1 id="todo-title">Todo List</h1>
      </div>
      <div class="count-pill">{{ facade.activeCount() }} active</div>
    </div>

    <form class="todo-form" (ngSubmit)="facade.addTodo()">
      <label class="sr-only" for="todo-input">New todo</label>
      <input
        id="todo-input"
        name="todo"
        type="text"
        autocomplete="off"
        placeholder="Add something useful"
        [ngModel]="facade.newTodo()"
        (ngModelChange)="facade.newTodo.set($event)"
      >
      <button type="submit">Add</button>
    </form>

    <div class="filters" role="group" aria-label="Todo filters">
      <button type="button" [class.active]="facade.filter() === 'all'" (click)="facade.setFilter('all')">All</button>
      <button type="button" [class.active]="facade.filter() === 'active'" (click)="facade.setFilter('active')">Active</button>
      <button type="button" [class.active]="facade.filter() === 'completed'" (click)="facade.setFilter('completed')">Done</button>
    </div>

    @if (facade.visibleTodos().length) {
      <ul class="todo-list">
        @for (todo of facade.visibleTodos(); track todo.id) {
          <li [class.completed]="todo.completed">
            <label>
              <input type="checkbox" [checked]="todo.completed" (change)="facade.toggleTodo(todo.id)">
              <span>{{ todo.title }}</span>
            </label>
            <button type="button" class="delete-button" (click)="facade.deleteTodo(todo.id)" aria-label="Delete todo">Delete</button>
          </li>
        }
      </ul>
    } @else {
      <p class="empty-state">Nothing here yet.</p>
    }

    <footer class="todo-footer">
      <span>{{ facade.completedCount() }} completed</span>
      <button type="button" (click)="facade.clearCompleted()" [disabled]="facade.completedCount() === 0">Clear completed</button>
    </footer>
  </section>
</main>
