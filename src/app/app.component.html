<main class="todo-shell">
  <section class="todo-panel" aria-labelledby="todo-title">
    <div class="panel-header">
      <div>
        <p class="eyebrow">Angular + Bazel</p>
        <h1 id="todo-title">Todo List</h1>
      </div>
      <div class="count-pill">{{ activeCount() }} active</div>
    </div>

    <form class="todo-form" (ngSubmit)="addTodo()">
      <label class="sr-only" for="todo-input">New todo</label>
      <input
        id="todo-input"
        name="todo"
        type="text"
        autocomplete="off"
        placeholder="Add something useful"
        [ngModel]="newTodo()"
        (ngModelChange)="newTodo.set($event)"
      >
      <button type="submit">Add</button>
    </form>

    <div class="filters" role="group" aria-label="Todo filters">
      <button type="button" [class.active]="filter() === 'all'" (click)="setFilter('all')">All</button>
      <button type="button" [class.active]="filter() === 'active'" (click)="setFilter('active')">Active</button>
      <button type="button" [class.active]="filter() === 'completed'" (click)="setFilter('completed')">Done</button>
    </div>

    @if (visibleTodos().length) {
      <ul class="todo-list">
        @for (todo of visibleTodos(); track todo.id) {
          <li [class.completed]="todo.completed">
            <label>
              <input type="checkbox" [checked]="todo.completed" (change)="toggleTodo(todo.id)">
              <span>{{ todo.title }}</span>
            </label>
            <button type="button" class="delete-button" (click)="deleteTodo(todo.id)" aria-label="Delete todo">Delete</button>
          </li>
        }
      </ul>
    } @else {
      <p class="empty-state">Nothing here yet.</p>
    }

    <footer class="todo-footer">
      <span>{{ completedCount() }} completed</span>
      <button type="button" (click)="clearCompleted()" [disabled]="completedCount() === 0">Clear completed</button>
    </footer>
  </section>
</main>
