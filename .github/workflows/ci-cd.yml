name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  repository-guards:
    name: Repository guards
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify repository safety rules
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $trackedPmFiles = @(git ls-files 'pm/**')
          if ($trackedPmFiles.Count -gt 0) {
            throw "The pm/ folder must not be tracked. Files found: $($trackedPmFiles -join ', ')"
          }

          $pmHistory = @(git log --all --name-only --pretty=format: -- pm | Where-Object { $_ })
          if ($pmHistory.Count -gt 0) {
            $uniquePmHistory = @($pmHistory | Sort-Object -Unique)
            throw "The pm/ folder must not appear in branch history. Files found: $($uniquePmHistory -join ', ')"
          }

          $allowedAgentFiles = @('AGENTS.md')
          $trackedAgentFiles = @(git ls-files | Where-Object { $_ -eq 'AGENTS.md' -or $_ -like '*/AGENTS.md' })
          $unexpectedAgentFiles = @($trackedAgentFiles | Where-Object { $_ -notin $allowedAgentFiles })
          $missingAgentFiles = @($allowedAgentFiles | Where-Object { $_ -notin $trackedAgentFiles })

          if ($unexpectedAgentFiles.Count -gt 0) {
            throw "Unexpected tracked AGENTS.md files found: $($unexpectedAgentFiles -join ', ')"
          }

          if ($missingAgentFiles.Count -gt 0) {
            throw "Expected tracked AGENTS.md files are missing: $($missingAgentFiles -join ', ')"
          }

  build:
    name: Build
    runs-on: windows-latest
    needs: repository-guards

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install dependencies
        run: npm ci

      - name: Build with Bazel
        run: npm run build

      - name: Test Checknote API
        run: npm run test:api

      - name: Stage build artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bazelBin = (& npx bazelisk info bazel-bin).Trim()
          $artifactPath = Join-Path $bazelBin 'api\src\Checknote.Api\checknote-site.zip'
          if (!(Test-Path $artifactPath)) {
            throw "Expected Bazel site artifact was not found: $artifactPath"
          }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item -LiteralPath $artifactPath -Destination artifacts/checknote-site.zip -Force

      - name: Upload Checknote site artifact
        uses: actions/upload-artifact@v4
        with:
          name: checknote-site
          path: artifacts/checknote-site.zip
          if-no-files-found: error
          retention-days: 14

  deploy:
    name: Deploy to web server
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Download Checknote site artifact
        uses: actions/download-artifact@v4
        with:
          name: checknote-site
          path: artifact/site

      - name: Unpack Checknote site
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path deploy | Out-Null
          Expand-Archive -Path artifact/site/checknote-site.zip -DestinationPath deploy -Force
          if (!(Test-Path deploy/web.config)) {
            throw 'Expected deploy/web.config was not found.'
          }
          if (!(Test-Path deploy/wwwroot/index.html)) {
            throw 'Expected deploy/wwwroot/index.html was not found.'
          }
          $indexHtml = Get-Content deploy/wwwroot/index.html -Raw
          if ($indexHtml -notmatch '<script[^>]+src="[^"]+\.js"') {
            throw 'Expected deploy/wwwroot/index.html to reference a JavaScript bundle.'
          }
          $apiExe = @(Get-ChildItem -Path deploy -Filter *.exe -File)
          if ($apiExe.Count -eq 0) {
            throw 'Expected the self-contained API publish output to include an executable.'
          }

      - name: Configure SSH
        env:
          WEB_SERVER_HOST: ${{ secrets.WEB_SERVER_HOST }}
          WEB_SERVER_SSH_KEY_B64: ${{ secrets.WEB_SERVER_SSH_KEY_B64 }}
          WEB_SERVER_PORT: ${{ secrets.WEB_SERVER_PORT }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path ~/.ssh | Out-Null
          $keyPath = Join-Path $HOME '.ssh/web_server_deploy_key'
          [IO.File]::WriteAllBytes($keyPath, [Convert]::FromBase64String($env:WEB_SERVER_SSH_KEY_B64))

      - name: Upload staged files
        timeout-minutes: 5
        env:
          WEB_SERVER_HOST: ${{ secrets.WEB_SERVER_HOST }}
          WEB_SERVER_USERNAME: ${{ secrets.WEB_SERVER_USERNAME }}
          WEB_SERVER_PORT: ${{ secrets.WEB_SERVER_PORT }}
          WEB_SERVER_REMOTE_PATH: ${{ secrets.WEB_SERVER_REMOTE_PATH }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $keyPath = Join-Path $HOME '.ssh/web_server_deploy_key'
          $remoteDeployPath = "$env:WEB_SERVER_REMOTE_PATH/.deploy/$env:GITHUB_SHA"
          $remoteZipPath = "$remoteDeployPath/checknote-site.zip"
          $remote = "$env:WEB_SERVER_USERNAME@$env:WEB_SERVER_HOST"
          $sshOptions = @('-o', 'BatchMode=yes', '-o', 'StrictHostKeyChecking=accept-new', '-o', 'ConnectTimeout=30', '-o', 'ServerAliveInterval=15', '-o', 'ServerAliveCountMax=4')

          Compress-Archive -Path deploy/* -DestinationPath checknote-site.zip -Force
          ssh @sshOptions -i $keyPath -p $env:WEB_SERVER_PORT $remote "powershell -NoProfile -ExecutionPolicy Bypass -Command `"New-Item -ItemType Directory -Force -Path '$remoteDeployPath' | Out-Null`""
          scp @sshOptions -i $keyPath -P $env:WEB_SERVER_PORT checknote-site.zip "${remote}:$remoteZipPath"

      - name: Publish staged files
        timeout-minutes: 5
        env:
          WEB_SERVER_HOST: ${{ secrets.WEB_SERVER_HOST }}
          WEB_SERVER_USERNAME: ${{ secrets.WEB_SERVER_USERNAME }}
          WEB_SERVER_PORT: ${{ secrets.WEB_SERVER_PORT }}
          WEB_SERVER_REMOTE_PATH: ${{ secrets.WEB_SERVER_REMOTE_PATH }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $keyPath = Join-Path $HOME '.ssh/web_server_deploy_key'
          $remoteDeployPath = "$env:WEB_SERVER_REMOTE_PATH/.deploy/$env:GITHUB_SHA"
          $remote = "$env:WEB_SERVER_USERNAME@$env:WEB_SERVER_HOST"
          $sshOptions = @('-o', 'BatchMode=yes', '-o', 'StrictHostKeyChecking=accept-new', '-o', 'ConnectTimeout=30', '-o', 'ServerAliveInterval=15', '-o', 'ServerAliveCountMax=4')
          $publishScript = @"
          `$ErrorActionPreference = 'Stop'
          `$site = '$env:WEB_SERVER_REMOTE_PATH'
          `$stage = '$remoteDeployPath'
          `$expanded = Join-Path `$stage 'site'
          `$backup = Join-Path `$site ('.backups/' + (Get-Date -Format 'yyyyMMddHHmmss'))
          New-Item -ItemType Directory -Force -Path `$site, `$backup, `$expanded | Out-Null
          Expand-Archive -Path (Join-Path `$stage 'checknote-site.zip') -DestinationPath `$expanded -Force
          if (!(Test-Path (Join-Path `$expanded 'web.config'))) {
            throw 'Expected site artifact web.config was not found.'
          }
          if (!(Test-Path (Join-Path `$expanded 'wwwroot\index.html'))) {
            throw 'Expected site artifact wwwroot/index.html was not found.'
          }
          Set-Content -LiteralPath (Join-Path `$site 'app_offline.htm') -Value 'Deploying Checknote' -NoNewline
          Start-Sleep -Seconds 2
          Get-ChildItem -LiteralPath `$site -Force | Where-Object {
            `$_.Name -notin @('.deploy', '.backups', '.htaccess')
          } | ForEach-Object {
            Move-Item -LiteralPath `$_.FullName -Destination `$backup -Force
          }
          Copy-Item -Path (Join-Path `$expanded '*') -Destination `$site -Recurse -Force
          "@
          $encodedScript = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($publishScript))
          ssh @sshOptions -i $keyPath -p $env:WEB_SERVER_PORT $remote "powershell -NoProfile -ExecutionPolicy Bypass -EncodedCommand $encodedScript"

      - name: Verify hello-world API
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = 'https://www.checknote.io/hello-world'
          $expected = 'Hello from Checknote API'
          for ($attempt = 1; $attempt -le 6; $attempt++) {
            try {
              $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 20
              $body = $response.Content.Trim()
              if ($response.StatusCode -eq 200 -and $body -eq $expected) {
                Write-Host "Verified $url"
                exit 0
              }
              Write-Host "Attempt $attempt returned status $($response.StatusCode) and body '$body'"
            }
            catch {
              Write-Host "Attempt $attempt failed: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds 5
          }
          throw "Expected $url to return '$expected'."

      - name: Verify Angular app
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = 'https://www.checknote.io/'
          $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 20
          if ($response.StatusCode -ne 200) {
            throw "Expected $url to return 200 OK."
          }
          if ($response.Content -notmatch '<script[^>]+src="[^"]+\.js"') {
            throw "Expected $url to return the Angular app shell."
          }
          Write-Host "Verified $url"
